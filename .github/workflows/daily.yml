name: Daily Paper Fetch

on:
  schedule:
    # 每天北京时间 05:17 运行（UTC+8，对应 UTC 21:17，即前一天）
    # 避开整点，降低 GitHub Actions schedule 在高负载时被延迟或丢弃的概率。
    - cron: "17 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "手动生成某一天的日报（YYYY-MM-DD）"
        required: false
        type: string
      start_date:
        description: "批量补日报开始日期（YYYY-MM-DD）"
        required: false
        type: string
      end_date:
        description: "批量补日报结束日期（YYYY-MM-DD）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Skip push events
        if: github.event_name == 'push'
        run: echo "Daily generation is skipped for normal code pushes."

      - name: Checkout
        if: github.event_name != 'push'
        uses: actions/checkout@v4

      - name: Set up Python
        if: github.event_name != 'push'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: github.event_name != 'push'
        run: pip install -r requirements.txt

      - name: Fetch papers and generate post
        if: github.event_name != 'push'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FETCH_DATE: ${{ inputs.date }}
          FETCH_START_DATE: ${{ inputs.start_date }}
          FETCH_END_DATE: ${{ inputs.end_date }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$FETCH_DATE" ]; then
            python fetch_papers.py --date "$FETCH_DATE"
            python -m unittest discover -s tests
            git add daily/ _posts/
            git diff --cached --quiet || git commit -m "daily paper: $FETCH_DATE"
            git pull --rebase origin main
            git push
            exit 0
          fi

          if [ -n "$FETCH_START_DATE" ] && [ -n "$FETCH_END_DATE" ]; then
            mapfile -t dates < <(python - <<'PY'
from datetime import date, timedelta
import os

start = date.fromisoformat(os.environ["FETCH_START_DATE"])
end = date.fromisoformat(os.environ["FETCH_END_DATE"])
current = start
while current <= end:
    print(current.isoformat())
    current += timedelta(days=1)
PY
)

            failed=()
            for day in "${dates[@]}"; do
              echo "[backfill] generating $day"
              temp_dir="$(mktemp -d)"
              cp -R . "$temp_dir/repo"
              cd "$temp_dir/repo"

              if ! python fetch_papers.py --date "$day"; then
                echo "[backfill] failed for $day"
                failed+=("$day")
                cd "$GITHUB_WORKSPACE"
                rm -rf "$temp_dir"
                continue
              fi
              if ! python -m unittest discover -s tests; then
                echo "[backfill] validation failed for $day"
                failed+=("$day")
                cd "$GITHUB_WORKSPACE"
                rm -rf "$temp_dir"
                continue
              fi

              git add daily/ _posts/
              if git diff --cached --quiet; then
                echo "[backfill] no changes for $day"
                cd "$GITHUB_WORKSPACE"
                rm -rf "$temp_dir"
                continue
              fi

              git commit -m "daily paper: $day"
              git pull --rebase origin main
              git push
              cd "$GITHUB_WORKSPACE"
              git pull --rebase origin main
              rm -rf "$temp_dir"
            done

            if [ "${#failed[@]}" -gt 0 ]; then
              printf '[backfill] failed dates: %s\n' "${failed[*]}"
              exit 1
            fi

            exit 0
          fi

          for offset in 3 2 1; do
            day="$(TZ=Asia/Shanghai date -d "$offset day ago" +%Y-%m-%d)"
            if [ -f "daily/$day/index.md" ]; then
              echo "[catch-up] $day already exists, skip"
              continue
            fi
            echo "[catch-up] generating missing $day"
            python fetch_papers.py --date "$day"
          done
          python -m unittest discover -s tests
          git add daily/ _posts/
          git diff --cached --quiet || git commit -m "daily paper: $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
