name: Daily Paper Fetch

on:
  schedule:
    # 每天北京时间 05:00 运行（UTC+8，对应 UTC 21:00，即前一天）
    - cron: "0 21 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers and generate post
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python fetch_papers.py

      - name: Commit and push new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _posts/
          git diff --cached --quiet || git commit -m "daily paper: $(date +%Y-%m-%d)"
          git push
