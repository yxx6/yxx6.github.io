name: Daily Paper Fetch

on:
  schedule:
    # 每天北京时间 05:17 运行（UTC+8，对应 UTC 21:17，即前一天）
    # 避开整点，降低 GitHub Actions schedule 在高负载时被延迟或丢弃的概率。
    - cron: "17 21 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      date:
        description: "手动生成某一天的日报（YYYY-MM-DD）"
        required: false
        type: string
      start_date:
        description: "批量补日报开始日期（YYYY-MM-DD）"
        required: false
        type: string
      end_date:
        description: "批量补日报结束日期（YYYY-MM-DD）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run daily generation
        id: gate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$COMMIT_MESSAGE" != *"[backfill-daily]"* ]]; then
            echo "Daily generation is skipped for normal code pushes."
            echo "run_daily=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_daily=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.run_daily == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run_daily == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.gate.outputs.run_daily == 'true'
        run: pip install -r requirements.txt

      - name: Fetch papers and generate post
        if: steps.gate.outputs.run_daily == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARXIV_MAX_ATTEMPTS: "8"
          ARXIV_RETRY_SLEEP_SECONDS: "60"
          FETCH_DATE: ${{ github.event.inputs.date }}
          FETCH_START_DATE: ${{ github.event.inputs.start_date }}
          FETCH_END_DATE: ${{ github.event.inputs.end_date }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          attempted_dates=()
          generation_failure_reason="生成脚本执行失败，等待后续自动补跑。"
          validation_failure_reason="内容校验未通过，等待后续自动补跑。"

          if [ -n "$FETCH_DATE" ]; then
            attempted_dates=("$FETCH_DATE")
            python fetch_papers.py --date "$FETCH_DATE" || \
              python fetch_papers.py --date "$FETCH_DATE" --force-fallback --fallback-reason "$generation_failure_reason"
            commit_message="daily paper: $FETCH_DATE"
          elif [ -n "$FETCH_START_DATE" ] && [ -n "$FETCH_END_DATE" ]; then
            python fetch_papers.py --start-date "$FETCH_START_DATE" --end-date "$FETCH_END_DATE" || \
              python fetch_papers.py --start-date "$FETCH_START_DATE" --end-date "$FETCH_END_DATE" --force-fallback --fallback-reason "$generation_failure_reason"
            commit_message="daily paper: $FETCH_START_DATE to $FETCH_END_DATE"
          else
            for offset in 3 2 1; do
              day="$(TZ=Asia/Shanghai date -d "$offset day ago" +%Y-%m-%d)"
              if [ -f "daily/$day/index.md" ] && ! grep -q "^generation_status: fallback$" "daily/$day/index.md"; then
                echo "[catch-up] $day already exists, skip"
                continue
              fi
              echo "[catch-up] generating missing $day"
              attempted_dates+=("$day")
              python fetch_papers.py --date "$day" || \
                python fetch_papers.py --date "$day" --force-fallback --fallback-reason "$generation_failure_reason"
            done
            commit_message="daily paper catch-up: $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          fi

          if ! python -m unittest discover -s tests; then
            echo "[validation] generated content failed validation; writing fallback page(s)."
            if [ -n "$FETCH_DATE" ]; then
              python fetch_papers.py --date "$FETCH_DATE" --force-fallback --fallback-reason "$validation_failure_reason"
            elif [ -n "$FETCH_START_DATE" ] && [ -n "$FETCH_END_DATE" ]; then
              python fetch_papers.py --start-date "$FETCH_START_DATE" --end-date "$FETCH_END_DATE" --force-fallback --fallback-reason "$validation_failure_reason"
            else
              for day in "${attempted_dates[@]}"; do
                python fetch_papers.py --date "$day" --force-fallback --fallback-reason "$validation_failure_reason"
              done
            fi
            python -m unittest discover -s tests
          fi

          git add daily/ _posts/
          if git diff --cached --quiet; then
            echo "No daily changes to commit."
            exit 0
          fi
          git commit -m "$commit_message"
          git pull --rebase origin main
          git push
