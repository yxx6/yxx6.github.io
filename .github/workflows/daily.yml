name: Daily Paper Fetch

on:
  schedule:
    # 每天北京时间 05:17 运行（UTC+8，对应 UTC 21:17，即前一天）
    # 避开整点，降低 GitHub Actions schedule 在高负载时被延迟或丢弃的概率。
    - cron: "17 21 * * *"
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      date:
        description: "手动生成某一天的日报（YYYY-MM-DD）"
        required: false
        type: string
      start_date:
        description: "批量补日报开始日期（YYYY-MM-DD）"
        required: false
        type: string
      end_date:
        description: "批量补日报结束日期（YYYY-MM-DD）"
        required: false
        type: string

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether to run daily generation
        id: gate
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        shell: bash
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ] && [[ "$COMMIT_MESSAGE" != *"[backfill-daily]"* ]]; then
            echo "Daily generation is skipped for normal code pushes."
            echo "run_daily=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "run_daily=true" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.gate.outputs.run_daily == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run_daily == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        if: steps.gate.outputs.run_daily == 'true'
        run: pip install -r requirements.txt

      - name: Fetch papers and generate post
        if: steps.gate.outputs.run_daily == 'true'
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ARXIV_MAX_ATTEMPTS: "8"
          ARXIV_RETRY_SLEEP_SECONDS: "60"
          FETCH_DATE: ${{ github.event.inputs.date }}
          FETCH_START_DATE: ${{ github.event.inputs.start_date }}
          FETCH_END_DATE: ${{ github.event.inputs.end_date }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          generate_validate_commit() {
            local day="$1"
            local commit_message="$2"

            echo "[daily] generating $day"
            if ! python fetch_papers.py --date "$day"; then
              echo "[daily] generation failed for $day"
              git restore -- daily/ _posts/
              git clean -fd -- daily/ _posts/
              return 1
            fi

            if ! python -m unittest discover -s tests; then
              echo "[daily] validation failed for $day; refusing to publish invalid report."
              git restore -- daily/ _posts/
              git clean -fd -- daily/ _posts/
              return 1
            fi

            git add daily/ _posts/
            if git diff --cached --quiet; then
              echo "[daily] no changes for $day"
              return 0
            fi

            git commit -m "$commit_message"
            git pull --rebase origin main
            git push
          }

          failed_dates=()

          if [ -n "$FETCH_DATE" ]; then
            generate_validate_commit "$FETCH_DATE" "daily paper: $FETCH_DATE"
            exit $?
          elif [ -n "$FETCH_START_DATE" ] && [ -n "$FETCH_END_DATE" ]; then
            mapfile -t dates < <(python -c 'from datetime import date, timedelta; import os; start=date.fromisoformat(os.environ["FETCH_START_DATE"]); end=date.fromisoformat(os.environ["FETCH_END_DATE"]); print("\n".join((start + timedelta(days=offset)).isoformat() for offset in range((end - start).days + 1)))')
            for day in "${dates[@]}"; do
              if ! generate_validate_commit "$day" "daily paper: $day"; then
                failed_dates+=("$day")
              fi
            done
          else
            for offset in 5 4 3 2 1; do
              day="$(TZ=Asia/Shanghai date -d "$offset day ago" +%Y-%m-%d)"
              if [ -f "daily/$day/index.md" ]; then
                echo "[catch-up] $day already exists, skip"
                continue
              fi
              if ! generate_validate_commit "$day" "daily paper: $day"; then
                failed_dates+=("$day")
              fi
            done
          fi

          if [ "${#failed_dates[@]}" -gt 0 ]; then
            printf '[daily] failed dates: %s\n' "${failed_dates[*]}"
            exit 1
          fi

          echo "[daily] all requested dates completed or already existed."
